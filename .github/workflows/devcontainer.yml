name: devcontainer

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 6 * * 4"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: devcontainer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish dev container image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .devcontainer/local/Dockerfile
          pull: true
          push: true
          tags: |
            ghcr.io/carlospedreira/devcontainer:latest
            ghcr.io/carlospedreira/devcontainer:${{ github.sha }}
