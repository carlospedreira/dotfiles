set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'

# Auto-restore last session on tmux start
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'

set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style "rounded"

set -g status-position top
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"
set -g @catppuccin_status_left_separator  ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

set -g status-bg "#101010"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind-key x kill-pane
bind-key & kill-window

bind-key T display-popup -E "sesh connect \"$(sesh list -tcd | sort -r | fzf)\""

bind L \
  split-window -v -l 30% -c "#{pane_current_path}" \; \
  split-window -h -t 1 -l 50% -c "#{pane_current_path}" \; \
  select-pane -t 1

run '~/.tmux/plugins/tpm/tpm'
